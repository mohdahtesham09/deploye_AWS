name: deploye to ec2

on:
  push:
    branches:
    - main

jobs:
  deploye:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: deploye via SSH
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ubuntu
        key: ${{ secrets.SSH_KEY }}
        script: |
          cd ~/deploye_AWS
          git pull
          sudo docker compose down
          sudo docker compose up -d --build
